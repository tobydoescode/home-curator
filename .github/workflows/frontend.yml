name: frontend

on:
  push:
    paths:
      - "apps/frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "apps/frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      # Stub the generated types so typecheck + build don't require a running backend.
      - run: |
          mkdir -p src/api
          echo 'export type paths = Record<string, never>;' > src/api/generated.ts
          echo 'export type components = { schemas: Record<string, never> };' >> src/api/generated.ts
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run build
