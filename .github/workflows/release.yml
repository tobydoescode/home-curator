name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate the frontend's API types from a local backend run so the
      # Docker build sees the real contract.
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Start backend to produce OpenAPI spec
        working-directory: apps/backend
        env:
          HA_URL: http://localhost:8123
          HA_TOKEN: fake
        run: |
          uv sync --all-extras
          nohup uv run uvicorn home_curator.main:app --port 8099 > /tmp/uvicorn.log 2>&1 &
          sleep 5
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Generate frontend API types
        working-directory: apps/frontend
        run: |
          npm ci
          npm run gen:api

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: home-curator/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/home-curator-${{ matrix.arch }}:${{ github.ref_name }}
